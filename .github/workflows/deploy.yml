name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: TypeScript check trước khi build image
  # ─────────────────────────────────────────────
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate

      - name: TypeScript check (server)
        working-directory: ./server
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # Job 2: Build và push Docker images lên GHCR
  # ─────────────────────────────────────────────
  build-and-push:
    needs: type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      # Export lowercase image name để dùng ở deploy step
      image_name_lower: ${{ steps.lowercase.outputs.image_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: lowercase
        run: echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Server
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}/server
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Client
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}/client
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}

  # ─────────────────────────────────────────────
  # Job 3: Deploy lên VPS
  # ─────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          # Tăng timeout để tránh SSH timeout khi pull image lớn
          command_timeout: 15m
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            # Ensure required directories exist
            mkdir -p nginx/ssl nginx/logs

            # ── Bước 1: Ghi .env ───────────────────────────────────
            # GITHUB_REPOSITORY phải lowercase để khớp với image name trên GHCR
            # (docker/metadata-action tự lowercase khi push)
            cat > .env << 'ENVEOF'
            POSTGRES_USER=vgfriend
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=vgfriend
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_SECURE=${{ secrets.SMTP_SECURE }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM_NAME=${{ secrets.SMTP_FROM_NAME }}
            GITHUB_REPOSITORY=${{ needs.build-and-push.outputs.image_name_lower }}
            ENVEOF
            # Xóa leading whitespace do YAML indentation
            sed -i 's/^[[:space:]]*//' .env

            # ── Bước 2: Login GHCR ─────────────────────────────────
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # ── Bước 3: Pull images mới ────────────────────────────
            docker compose pull

            # ── Bước 4: Start database trước, chờ healthy ─────────
            docker compose up -d postgres redis

            echo "Waiting for PostgreSQL to be ready..."
            for i in $(seq 1 30); do
              if docker compose exec -T postgres pg_isready -U vgfriend -d vgfriend > /dev/null 2>&1; then
                echo "PostgreSQL is ready."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: PostgreSQL did not become ready in time."
                exit 1
              fi
              sleep 2
            done

            # ── Bước 5: Chạy migration TRƯỚC khi start server ──────
            # Dùng docker compose run để tạo container tạm từ image mới
            # --no-deps: không start lại postgres (đã chạy ở trên)
            # --rm: tự xóa container sau khi xong
            echo "Running database migrations..."
            docker compose run --rm --no-deps server npx prisma migrate deploy
            echo "Migrations completed."

            # ── Bước 5.5: Seed database (idempotent - safe to run multiple times)
            # This uses upsert so it won't duplicate or delete user data
            echo "Seeding database..."
            docker compose run --rm --no-deps server npx prisma db seed
            echo "Seeding completed."

            # ── Bước 6: Start tất cả services ─────────────────────
            docker compose --profile production up -d --force-recreate

            # ── Bước 7: Verify server healthy ──────────────────────
            echo "Waiting for server to be healthy..."
            for i in $(seq 1 20); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' vgfriend-server 2>/dev/null || echo "starting")
              if [ "$STATUS" = "healthy" ]; then
                echo "Server is healthy!"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "ERROR: Server did not become healthy. Check logs:"
                docker compose logs --tail=50 server
                exit 1
              fi
              echo "Server status: $STATUS, retrying ($i/20)..."
              sleep 5
            done

            # ── Bước 8: Cleanup images cũ (chỉ sau deploy thành công)
            # Dùng -f thay vì -af để giữ lại images tagged (dễ rollback)
            docker image prune -f

            echo "Deployment completed successfully!"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment to ${{ github.event.inputs.environment }} was successful!"
          else
            echo "❌ Deployment to ${{ github.event.inputs.environment }} failed!"
          fi
