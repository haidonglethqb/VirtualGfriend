name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: TypeScript check trước khi build image
  # ─────────────────────────────────────────────
  type-check:
    runs-on: ubuntu-latest
    outputs:
      image_name_lower: ${{ steps.lowercase.outputs.image_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: lowercase
        run: echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate

      - name: TypeScript check (server)
        working-directory: ./server
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # Job 2a: Build và push Server image (PARALLEL)
  # ─────────────────────────────────────────────
  build-server:
    needs: type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Server
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.type-check.outputs.image_name_lower }}/server
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 2b: Build và push Client image (PARALLEL)
  # ─────────────────────────────────────────────
  build-client:
    needs: type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Client
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.type-check.outputs.image_name_lower }}/client
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

  # ─────────────────────────────────────────────
  # Job 3: Deploy lên VPS (đợi cả 2 builds hoàn thành)
  # ─────────────────────────────────────────────
  deploy:
    needs: [type-check, build-server, build-client]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.yml"
          target: ${{ secrets.VPS_DEPLOY_PATH }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          # Timeout 10 phút là đủ khi các services ready đúng cách
          command_timeout: 10m
          script: |
            set -e

            echo ""
            echo "============================================================"
            echo "DEPLOYMENT STARTED"
            echo "============================================================"
            echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "User: ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
            echo "Path: ${{ secrets.VPS_DEPLOY_PATH }}"
            echo "============================================================"

            cd ${{ secrets.VPS_DEPLOY_PATH }}

            # Show current state
            echo ""
            echo "CURRENT STATE"
            echo "------------------------------------------------------------"
            echo "Disk usage:"
            df -h / | tail -1
            echo ""
            echo "Docker images (VGfriend):"
            docker images | grep -i vgfriend || echo "  (no VGfriend images found)"
            echo ""
            echo "Running containers:"
            docker compose ps 2>/dev/null || echo "  (no compose stack running)"
            echo "------------------------------------------------------------"

            # Ensure required directories exist
            echo ""
            echo "Step 0: Ensuring directories exist..."
            mkdir -p nginx/ssl nginx/logs
            echo "DONE: Directories ready"

            # Validate critical secrets to prevent partial deploy causing runtime 503s
            echo ""
            echo "Step 0.5: Validating required secrets..."
            check_required() {
              if [ -z "$2" ]; then
                echo "ERROR: Missing required deployment secret: $1"
                exit 1
              fi
              echo "  OK: $1 is set"
            }

            check_required "POSTGRES_PASSWORD" "${{ secrets.POSTGRES_PASSWORD }}"
            check_required "JWT_SECRET" "${{ secrets.JWT_SECRET }}"
            check_required "JWT_REFRESH_SECRET" "${{ secrets.JWT_REFRESH_SECRET }}"
            check_required "ADMIN_USERNAME" "${{ secrets.ADMIN_USERNAME }}"
            check_required "ADMIN_PASSWORD_HASH" "${{ secrets.ADMIN_PASSWORD_HASH }}"
            check_required "ADMIN_JWT_SECRET" "${{ secrets.ADMIN_JWT_SECRET }}"
            check_required "GROQ_API_KEY" "${{ secrets.GROQ_API_KEY }}"
            check_required "CR_PAT" "${{ secrets.CR_PAT }}"
            check_required "VPS_DEPLOY_PATH" "${{ secrets.VPS_DEPLOY_PATH }}"
            echo "DONE: All required secrets validated"

            # ── Bước 1: Ghi .env ───────────────────────────────────
            echo ""
            echo "Step 1: Writing .env file..."
            cat > .env << 'ENVEOF'
            POSTGRES_USER=vgfriend
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=vgfriend
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            ADMIN_PASSWORD_HASH=${{ secrets.ADMIN_PASSWORD_HASH }}
            ADMIN_JWT_SECRET=${{ secrets.ADMIN_JWT_SECRET }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_SECURE=${{ secrets.SMTP_SECURE }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM_NAME=${{ secrets.SMTP_FROM_NAME }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            DO_SPACES_KEY=${{ secrets.DO_SPACES_KEY }}
            DO_SPACES_SECRET=${{ secrets.DO_SPACES_SECRET }}
            DO_SPACES_ENDPOINT=https://sgp1.digitaloceanspaces.com
            DO_SPACES_BUCKET=haichu
            DO_SPACES_REGION=sgp1
            GITHUB_REPOSITORY=${{ needs.type-check.outputs.image_name_lower }}
            ENVEOF
            # Xóa leading whitespace và escape $ trong values
            sed -i 's/^[[:space:]]*//' .env
            sed -i 's/\([^=]\)\$/\1$$/g' .env
            echo "DONE: .env written ($(wc -l < .env) lines)"
            echo "   GITHUB_REPOSITORY = ${{ needs.type-check.outputs.image_name_lower }}"

            # ── Bước 2: Login GHCR ─────────────────────────────────
            echo ""
            echo "Step 2: Logging into GitHub Container Registry..."
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin 2>&1 | tail -1
            echo "DONE: GHCR login successful"

            # ── Bước 3: Pull images mới ────────────────────────────
            echo ""
            echo "Step 3: Pulling new Docker images..."
            echo "   Pulling server image: ghcr.io/${{ needs.type-check.outputs.image_name_lower }}/server:latest"
            echo "   Pulling client image: ghcr.io/${{ needs.type-check.outputs.image_name_lower }}/client:latest"
            docker compose pull 2>&1
            echo "DONE: Images pulled"
            echo ""
            echo "Pulled images:"
            docker images | grep -i "virtualgfriend\|vgfriend" || echo "  (no images found)"

            # ── Bước 4: Start database trước, chờ healthy ─────────
            echo ""
            echo "Step 4: Starting database services..."
            docker compose up -d postgres redis
            echo "   PostgreSQL and Redis containers started"

            echo ""
            echo "Waiting for PostgreSQL to be ready..."
            for i in $(seq 1 30); do
              if docker compose exec -T postgres pg_isready -U vgfriend -d vgfriend > /dev/null 2>&1; then
                echo "DONE: PostgreSQL is ready. (attempt $i/30)"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: PostgreSQL did not become ready in time."
                echo "PostgreSQL logs:"
                docker compose logs --tail=30 postgres
                exit 1
              fi
              echo "   PostgreSQL not ready yet... (attempt $i/30, retrying in 2s)"
              sleep 2
            done

            echo ""
            echo "Waiting for Redis to be ready..."
            for i in $(seq 1 15); do
              if docker compose exec -T redis redis-cli ping > /dev/null 2>&1; then
                echo "DONE: Redis is ready. (attempt $i/15)"
                break
              fi
              if [ "$i" -eq 15 ]; then
                echo "WARNING: Redis not ready, continuing anyway (cache is optional)..."
              fi
              sleep 2
            done

            # ── Bước 5: Chạy migration ─────────────────────────────
            echo ""
            echo "Step 5: Running database migrations..."
            echo "   DATABASE_URL = postgresql://vgfriend:***@postgres:5432/vgfriend?schema=public"
            echo ""

            # Check existing migrations before running
            echo "Existing migrations on VPS:"
            ls -1 prisma/migrations/ 2>/dev/null | sort || echo "  (no migrations directory)"
            echo ""

            # Run migration with full output captured
            echo ">>> Running: npx prisma migrate deploy"
            MIGRATION_OUTPUT=$(docker compose run --rm --no-deps \
              -e DATABASE_URL="postgresql://vgfriend:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/vgfriend?schema=public" \
              server npx prisma migrate deploy 2>&1)
            MIGRATION_EXIT_CODE=$?

            # Print full migration output
            echo "$MIGRATION_OUTPUT"
            echo ""
            echo "<<< Migration command finished with exit code: $MIGRATION_EXIT_CODE"
            echo ""

            if [ $MIGRATION_EXIT_CODE -eq 0 ]; then
              echo "================================================================"
              echo "MIGRATION STATUS: SUCCESS"
              echo "================================================================"
              echo ""

              # Check if any migrations were actually applied
              if echo "$MIGRATION_OUTPUT" | grep -q "already in sync"; then
                echo "Result: Database is already up to date. No new migrations applied."
              elif echo "$MIGRATION_OUTPUT" | grep -q "migration"; then
                echo "Result: New migration(s) applied successfully."
                echo ""
                echo "Applied migrations:"
                echo "$MIGRATION_OUTPUT" | grep -i "migration" || true
              else
                echo "Result: Migration completed without errors."
              fi

              echo ""
              echo "Current migration list on VPS:"
              ls -1 prisma/migrations/ 2>/dev/null | sort || echo "  (cannot list)"
              echo ""
              echo "================================================================"
              echo "MIGRATION: SUCCESS - Database schema is up to date"
              echo "================================================================"
            else
              echo "================================================================"
              echo "MIGRATION STATUS: FAILED"
              echo "================================================================"
              echo "Exit code: $MIGRATION_EXIT_CODE"
              echo ""
              echo "Full migration output:"
              echo "$MIGRATION_OUTPUT"
              echo ""
              echo "Full server logs:"
              docker compose logs --tail=100 server
              echo ""
              echo "================================================================"
              echo "MIGRATION: FAILED - Deployment aborted"
              echo "================================================================"
              exit 1
            fi

            # ── Bước 5.5: Seed database ────────────────────────────
            echo ""
            echo "Step 5.5: Seeding database..."
            echo "--- Seed Output ---"
            docker compose run --rm --no-deps \
              -e DATABASE_URL="postgresql://vgfriend:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/vgfriend?schema=public" \
              -e REDIS_URL="redis://redis:6379" \
              server npx prisma db seed 2>&1
            SEED_EXIT_CODE=$?
            echo "--- End Seed Output ---"
            echo ""

            if [ $SEED_EXIT_CODE -eq 0 ]; then
              echo "DONE: Seeding completed successfully"
            else
              echo "WARNING: Seed failed with exit code $SEED_EXIT_CODE (may be already seeded)"
            fi

            # ── Bước 6: Start tất cả services ─────────────────────
            echo ""
            echo "Step 6: Starting all services..."
            docker compose --profile production up -d --force-recreate 2>&1
            echo "DONE: All services started with --force-recreate"

            echo ""
            echo "Service status:"
            docker compose ps

            # ── Bước 7: Verify server healthy ──────────────────────
            echo ""
            echo "Step 7: Waiting for server to be healthy..."
            for i in $(seq 1 20); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' vgfriend-server 2>/dev/null || echo "starting")
              if [ "$STATUS" = "healthy" ]; then
                echo "DONE: Server is healthy! (check $i/20)"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "ERROR: Server did not become healthy. Check logs:"
                echo ""
                echo "Server logs (last 50 lines):"
                docker compose logs --tail=50 server
                echo ""
                echo "All container statuses:"
                docker compose ps
                exit 1
              fi
              echo "   Server status: $STATUS (check $i/20, retrying in 5s)..."
              sleep 5
            done

            # Post-deployment verification
            echo ""
            echo "Post-deployment verification..."
            echo ""
            echo "Health check endpoint:"
            curl -sf http://localhost:3001/health 2>&1 | head -5 || echo "  (health endpoint not accessible)"
            echo ""

            echo "Database stats:"
            docker compose run --rm --no-deps \
              -e DATABASE_URL="postgresql://vgfriend:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/vgfriend?schema=public" \
              server sh -c 'npx prisma db execute --stdin --schema=prisma/schema.prisma <<EOF
              SELECT count(*) as user_count FROM users;
              SELECT count(*) as character_count FROM characters;
              SELECT count(*) as quest_count FROM quests;
              SELECT count(*) as arc_count FROM arcs;
              SELECT count(*) as title_count FROM titles;
              EOF' 2>/dev/null || echo "  (could not query database)"

            # ── Bước 8: Background cleanup ─────────────────────────
            echo ""
            echo "Step 8: Starting background cleanup..."
            nohup bash -c '
              sleep 5
              echo "  Pruning stopped containers..."
              docker container prune -f > /dev/null 2>&1
              echo "  Pruning dangling images..."
              docker image prune -f > /dev/null 2>&1
              echo "  Removing old server images (keeping latest 3)..."
              docker images "ghcr.io/${{ needs.type-check.outputs.image_name_lower }}/server" --format "{{.ID}} {{.CreatedAt}}" | sort -k2 -r | tail -n +4 | awk "{print \$1}" | xargs -r docker rmi -f 2>/dev/null || true
              echo "  Removing old client images (keeping latest 3)..."
              docker images "ghcr.io/${{ needs.type-check.outputs.image_name_lower }}/client" --format "{{.ID}} {{.CreatedAt}}" | sort -k2 -r | tail -n +4 | awk "{print \$1}" | xargs -r docker rmi -f 2>/dev/null || true
              echo "  Pruning build cache (keeping 500MB)..."
              docker builder prune -f --keep-storage 500MB > /dev/null 2>&1 || true
              echo "  Pruning unused networks..."
              docker network prune -f > /dev/null 2>&1
            ' > /tmp/docker-cleanup.log 2>&1 &
            echo "DONE: Cleanup started in background"

            # Final summary
            echo ""
            echo "============================================================"
            echo "DEPLOYMENT COMPLETED"
            echo "============================================================"
            echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "Final disk usage:"
            df -h / | tail -1
            echo ""
            echo "Final container status:"
            docker compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || docker compose ps
            echo ""
            echo "Endpoints:"
            echo "   Frontend:  https://vgfriend.io.vn"
            echo "   Backend:   https://vgfriend.io.vn/api"
            echo "   Health:    https://vgfriend.io.vn/health"
            echo "   Admin:     https://vgfriend.io.vn/admin"
            echo "============================================================"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment to ${{ github.event.inputs.environment }} was successful!"
          else
            echo "Deployment to ${{ github.event.inputs.environment }} failed!"
          fi
