name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: TypeScript check trước khi build image
  # ─────────────────────────────────────────────
  type-check:
    runs-on: ubuntu-latest
    outputs:
      image_name_lower: ${{ steps.lowercase.outputs.image_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: lowercase
        run: echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate

      - name: TypeScript check (server)
        working-directory: ./server
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # Job 2a: Build và push Server image (PARALLEL)
  # ─────────────────────────────────────────────
  build-server:
    needs: type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Server
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.type-check.outputs.image_name_lower }}/server
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 2b: Build và push Client image (PARALLEL)
  # ─────────────────────────────────────────────
  build-client:
    needs: type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Client
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.type-check.outputs.image_name_lower }}/client
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}

  # ─────────────────────────────────────────────
  # Job 3: Deploy lên VPS (đợi cả 2 builds hoàn thành)
  # ─────────────────────────────────────────────
  deploy:
    needs: [type-check, build-server, build-client]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.yml"
          target: ${{ secrets.VPS_DEPLOY_PATH }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          # Timeout 10 phút là đủ khi các services ready đúng cách
          command_timeout: 10m
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            # Ensure required directories exist
            mkdir -p nginx/ssl nginx/logs

            # Validate critical secrets to prevent partial deploy causing runtime 503s
            check_required() {
              if [ -z "$2" ]; then
                echo "ERROR: Missing required deployment secret: $1"
                exit 1
              fi
            }

            check_required "POSTGRES_PASSWORD" "${{ secrets.POSTGRES_PASSWORD }}"
            check_required "JWT_SECRET" "${{ secrets.JWT_SECRET }}"
            check_required "JWT_REFRESH_SECRET" "${{ secrets.JWT_REFRESH_SECRET }}"
            check_required "ADMIN_USERNAME" "${{ secrets.ADMIN_USERNAME }}"
            check_required "ADMIN_PASSWORD_HASH" "${{ secrets.ADMIN_PASSWORD_HASH }}"
            check_required "ADMIN_JWT_SECRET" "${{ secrets.ADMIN_JWT_SECRET }}"

            # ── Bước 1: Ghi .env ───────────────────────────────────
            cat > .env << 'ENVEOF'
            POSTGRES_USER=vgfriend
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=vgfriend
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            ADMIN_PASSWORD_HASH="${{ secrets.ADMIN_PASSWORD_HASH }}"
            ADMIN_JWT_SECRET=${{ secrets.ADMIN_JWT_SECRET }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_SECURE=${{ secrets.SMTP_SECURE }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM_NAME=${{ secrets.SMTP_FROM_NAME }}
            GITHUB_REPOSITORY=${{ needs.type-check.outputs.image_name_lower }}
            ENVEOF
            # Xóa leading whitespace và escape $ trong values
            sed -i 's/^[[:space:]]*//' .env
            sed -i 's/\([^=]\)\$/\1$$/g' .env

            # ── Bước 2: Login GHCR ─────────────────────────────────
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # ── Bước 3: Pull images mới ────────────────────────────
            docker compose pull

            # ── Bước 4: Start database trước, chờ healthy ─────────
            docker compose up -d postgres redis

            echo "Waiting for PostgreSQL to be ready..."
            for i in $(seq 1 30); do
              if docker compose exec -T postgres pg_isready -U vgfriend -d vgfriend > /dev/null 2>&1; then
                echo "PostgreSQL is ready."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: PostgreSQL did not become ready in time."
                exit 1
              fi
              sleep 2
            done

            echo "Waiting for Redis to be ready..."
            for i in $(seq 1 15); do
              if docker compose exec -T redis redis-cli ping > /dev/null 2>&1; then
                echo "Redis is ready."
                break
              fi
              if [ "$i" -eq 15 ]; then
                echo "WARNING: Redis not ready, continuing anyway (cache is optional)..."
                break
              fi
              sleep 2
            done

            # ── Bước 5: Chạy migration ─────────────────────────────
            echo "Running database migrations..."
            docker compose run --rm --no-deps \
              -e DATABASE_URL="postgresql://vgfriend:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/vgfriend?schema=public" \
              server npx prisma migrate deploy
            echo "Migrations completed."

            # ── Bước 5.5: Seed database ────────────────────────────
            echo "Seeding database..."
            docker compose run --rm --no-deps \
              -e DATABASE_URL="postgresql://vgfriend:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/vgfriend?schema=public" \
              -e REDIS_URL="redis://redis:6379" \
              server npx prisma db seed
            echo "Seeding completed."

            # ── Bước 6: Start tất cả services ─────────────────────
            docker compose --profile production up -d --force-recreate

            # ── Bước 7: Verify server healthy ──────────────────────
            echo "Waiting for server to be healthy..."
            for i in $(seq 1 20); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' vgfriend-server 2>/dev/null || echo "starting")
              if [ "$STATUS" = "healthy" ]; then
                echo "Server is healthy!"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "ERROR: Server did not become healthy. Check logs:"
                docker compose logs --tail=50 server
                exit 1
              fi
              echo "Server status: $STATUS, retrying ($i/20)..."
              sleep 5
            done

            # ── Bước 8: Background cleanup ─────────────────────────
            echo "Starting background cleanup..."
            nohup bash -c '
              sleep 5
              docker container prune -f
              docker image prune -f
              docker images "ghcr.io/${{ needs.type-check.outputs.image_name_lower }}/server" --format "{{.ID}} {{.CreatedAt}}" | sort -k2 -r | tail -n +4 | awk "{print \$1}" | xargs -r docker rmi -f 2>/dev/null || true
              docker images "ghcr.io/${{ needs.type-check.outputs.image_name_lower }}/client" --format "{{.ID}} {{.CreatedAt}}" | sort -k2 -r | tail -n +4 | awk "{print \$1}" | xargs -r docker rmi -f 2>/dev/null || true
              docker builder prune -f --keep-storage 500MB 2>/dev/null || true
              docker network prune -f
            ' > /tmp/docker-cleanup.log 2>&1 &

            echo "Disk usage:"
            df -h / | tail -1

            echo "Deployment completed successfully!"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment to ${{ github.event.inputs.environment }} was successful!"
          else
            echo "❌ Deployment to ${{ github.event.inputs.environment }} failed!"
          fi
